<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>George & Olivia — Daily Blueprint</title>

<style>
  :root {
    --bg: #fafaf9;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --indigo: #6366f1;
    --indigo-light: rgba(99,102,241,0.08);
    --indigo-border: rgba(99,102,241,0.25);
    --amber: #f59e0b;
    --amber-light: rgba(245,158,11,0.08);
    --amber-border: rgba(245,158,11,0.25);
    --gray: #6b7280;
    --gray-light: rgba(107,114,128,0.06);
    --gray-border: rgba(107,114,128,0.2);
    --purple: #8b5cf6;
    --purple-light: rgba(139,92,246,0.08);
    --purple-border: rgba(139,92,246,0.25);
    --pink: #ec4899;
    --pink-light: rgba(236,72,153,0.08);
    --pink-border: rgba(236,72,153,0.25);
    --green: #10b981;
    --green-light: rgba(16,185,129,0.08);
    --green-border: rgba(16,185,129,0.25);
    --card-radius: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --text: #e8e8f0;
      --text-muted: #9ca3af;
      --indigo-light: rgba(99,102,241,0.12);
      --indigo-border: rgba(99,102,241,0.3);
      --amber-light: rgba(245,158,11,0.12);
      --amber-border: rgba(245,158,11,0.3);
      --gray-light: rgba(107,114,128,0.1);
      --gray-border: rgba(107,114,128,0.25);
      --purple-light: rgba(139,92,246,0.12);
      --purple-border: rgba(139,92,246,0.3);
      --pink-light: rgba(236,72,153,0.12);
      --pink-border: rgba(236,72,153,0.3);
      --green-light: rgba(16,185,129,0.12);
      --green-border: rgba(16,185,129,0.3);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease;
  }

  .header .label {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.4;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .header p {
    opacity: 0.5;
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.5;
  }

  .tabs {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease 0.1s both;
  }

  .tab {
    padding: 9px 14px;
    border-radius: 99px;
    border: 2px solid rgba(128,128,128,0.12);
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .tab:hover { border-color: rgba(128,128,128,0.3); }

  .tab.active {
    border-color: var(--indigo);
    background: var(--indigo);
    color: #fff;
  }

  .plan-info {
    margin-bottom: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    animation: fadeUp 0.4s ease;
  }

  .plan-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 12px;
  }

  .plan-meta .plan-label { font-weight: 700; }
  .plan-meta span { opacity: 0.6; }

  .schedule { display: flex; flex-direction: column; gap: 6px; }

  .block {
    border-radius: var(--card-radius);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    animation: fadeUp 0.4s ease both;
  }

  .block:active { transform: scale(0.985); }

  .block-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .block-icon { font-size: 22px; flex-shrink: 0; }

  .block-content { flex: 1; min-width: 0; }

  .block-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
    flex-wrap: wrap;
  }

  .block-time {
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .block-type {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    color: #fff;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .block-activity {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
  }

  .block-activity .person-label {
    opacity: 0.5;
    font-size: 12px;
  }

  .block-chevron {
    font-size: 18px;
    opacity: 0.3;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .block-chevron.open { transform: rotate(180deg); }

  .block-note {
    margin-top: 12px;
    padding-top: 12px;
    font-size: 13px;
    line-height: 1.7;
    opacity: 0.8;
    white-space: pre-line;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, margin-top 0.35s ease, padding-top 0.35s ease;
    margin-top: 0;
    padding-top: 0;
  }

  .block-note.open {
    max-height: 500px;
    margin-top: 12px;
    padding-top: 12px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px 0;
    padding-top: 8px;
  }

  .rule-card {
    padding: 16px 18px;
    border-radius: var(--card-radius);
    background: var(--indigo-light);
    border: 1.5px solid var(--indigo-border);
    margin-bottom: 8px;
    animation: fadeUp 0.4s ease both;
  }

  .rule-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .rule-title span:first-child { font-size: 20px; }

  .rule-title span:last-child {
    font-size: 15px;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
  }

  .rule-desc {
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.8;
  }

  .protocol-card {
    padding: 16px 18px;
    border-radius: var(--card-radius);
    background: var(--green-light);
    border: 1.5px solid var(--green-border);
    margin-bottom: 8px;
    animation: fadeUp 0.4s ease both;
  }

  .protocol-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }

  .protocol-step {
    display: flex;
    gap: 10px;
    font-size: 13px;
    line-height: 1.6;
  }

  .protocol-step .num {
    color: var(--green);
    font-weight: 700;
    flex-shrink: 0;
  }

  .protocol-step .text { opacity: 0.8; }

  .big-picture {
    margin-top: 16px;
    padding: 20px;
    border-radius: var(--card-radius);
    background: linear-gradient(135deg, var(--indigo-light), var(--purple-light));
    border: 1.5px solid var(--indigo-border);
    animation: fadeUp 0.5s ease both;
  }

  .big-picture h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 12px;
  }

  .big-picture .tree-item {
    font-size: 14px;
    line-height: 1.8;
    opacity: 0.85;
    margin-bottom: 8px;
  }

  .section-view { display: none; }
  .section-view.active { display: block; }

  .protocols-subtitle {
    font-size: 13px;
    opacity: 0.6;
    margin: 4px 0 12px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

    { time: "7:20–8:10", g: "Career growth (50 min)", o: "Career growth (40 min)", icon: "📈", type: "solo", note: "Same career block as a normal early day. George is WFH today so no commute — but keep the same morning routine for consistency." },
    { time: "8:10–8:30", g: "Breakfast", o: "Breakfast", icon: "🥣", type: "together", note: "No rush today — George works from home. Enjoy a slightly slower breakfast together." },
    { time: "9:00–5:00", g: "Work (WFH)", o: "Work", icon: "💻", type: "work", note: "George works from home. Olivia normal schedule." },
    { time: "5:00 PM+", g: "Evening is completely free", o: "Evening is completely free", icon: "🌟", type: "flex", note: "Friday evening is unscheduled. Date night, friends, fancy dinner, binge anime, do nothing — whatever you want.\n\nNo journal, guitar, or career growth obligations.\nOlivia: guitar or journal if you want, zero pressure." },
    { time: "Bedtime", g: "Sleep whenever (cap 1:30 AM)", o: "Sleep whenever (cap 1:30 AM)", icon: "🌙", type: "flex", note: "Friday is your release valve. Cap at 1:30 AM → up by 10 AM Saturday." },
  ],
};

const GROUND_RULES = [
  { t: "The Phone Rule", i: "📵", d: "Phones charge across the room overnight. You physically get up to silence the alarm. Kills morning scrolling, late-night scrolling, and snooze battles." },
  { t: "The Kitchen Rule", i: "🍳", d: "George: on cooking nights, walk in and go straight to the kitchen. On late days, gym first, then kitchen right after. No couch in between." },
  { t: "The Buddy System", i: "🤝", d: "Wake up together, gym together, bed together. If one can't make it, the other still goes." },
  { t: "Early & Late Are Equal", i: "⚖️", d: "Neither is 'better.' Early front-loads growth into the morning. Late puts everything at night and you sleep later. Both get everything done." },
  { t: "Late Days Protect Tasks, Not Sleep", i: "🌙", d: "On late days, everything still gets done — gym, career growth, journal, guitar, anime. You stay up later to make it happen. Sleep flexes, not your goals." },
  { t: "The Sunday Reset", i: "🔄", d: "Every Sunday evening, 30 min: climbing day, dance day, WFH days, restaurant visits, meal plan, rough early/late intentions." },
  { t: "The Bedtime Pact", i: "😴", d: "Go to bed together every night — early or late. No exceptions on weeknights." },
  { t: "Friday = Early + Free Night", i: "🌟", d: "Friday morning is always early. Front-load gym + career growth. Evening is 100% free." },
  { t: "Weekend Body Clock", i: "🕐", d: "Fri/Sat: bed by 1:30 AM, up by 10 AM. Sunday night: back to weekday bedtime." },
];

const PROTOCOLS = [
  { t: "Can't fall asleep", i: "🌙", s: ["Don't stress — that makes it worse.", "Still awake 30 min after lying down? Get up, do something boring for 15 min.", "No phones. Blue light will make it worse.", "Tomorrow: late day. Follow the late plan.", "2+ nights in a row: no caffeine after 2 PM, no screens after wind-down."] },
  { t: "Dinner is running late", i: "🍳", s: ["George not home by 5:30 on a cooking night? Order food.", "Late day gym ran long, cooking won't start until 7 PM? Order food.", "Dinner won't start until after 7:30? Skip anime tonight.", "Sunday meal prep makes weeknight cooking 2x faster."] },
  { t: "One has energy, the other doesn't", i: "🤝", s: ["Energized person leads gently: 'I'm heading to the gym, join me.'", "Tired person commits to 15 minutes.", "If one truly can't, the other still goes.", "Consistently dragging? Discuss at Sunday Reset."] },
  { t: "Phone / scrolling relapse", i: "📱", s: ["Phones across the room at night. Non-negotiable.", "Scrolling in bed? Stand up immediately.", "App timers: 15 min for social media after 8 PM.", "George after work: walk to kitchen, not couch.", "Code word: 'Hey, should we [next thing]?'"] },
  { t: "George has restaurant visit (home ~7 PM)", i: "🍜", s: ["Order food — no cooking.", "Olivia uses 5:30–7 for guitar, career growth, or rest.", "George arrives ~7, eat together. Follow evening from 7:45.", "Shifts schedule ~45 min later."] },
  { t: "Missed guitar (Olivia)", i: "🎸", s: ["Primary slot: after shower in the evening.", "Missed? It's missed. Don't stress.", "Aim for 5 out of 7 days.", "On tight nights (Late + Climb), guitar can be cut first."] },
  { t: "Choosing early vs. late", i: "🤔", s: ["Decide BEFORE bed: 'Are we early or late tomorrow?'", "Early: alarm 6 AM, phones across room, gym clothes out.", "Late: alarm 8 AM. No guilt. Follow the late plan.", "Default to early when possible.", "At Sunday Reset, rough-plan early/late days. Stay flexible."] },
];

const DECISION_TREE = [
  { label: "Friday?", value: "Always the Friday plan (early morning, free evening)." },
  { label: "Climbing/dance tonight?", value: "Early + Climb/Dance or Late + Climb/Dance." },
  { label: "Regular day?", value: "Early Day or Late Day." },
  { label: "Early or late?", value: "Decide the night before. Default to early when you can." },
  { label: "Late days:", value: "Everything gets done. You sleep later — that's the trade-off." },
  { label: "Weekends:", value: "No set schedule. Bed by 1:30 AM, up by 10 AM. Sunday night: back to weekday bedtime." },
];

let activeTab = 'earlyNormal';

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = TABS.map(tab =>
    `<button class="tab ${tab.key === activeTab ? 'active' : ''}" data-key="${tab.key}">${tab.label}</button>`
  ).join('');

  container.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.key;
      renderTabs();
      renderContent();
    });
  });
}

function renderBlock(b, i) {
  const s = TYPE_STYLES[b.type];
  const isSame = b.g === b.o;
  const activityHTML = isSame
    ? `<div class="block-activity">${b.g}</div>`
    : `<div class="block-activity"><span class="person-label">G:</span> ${b.g}<br><span class="person-label">O:</span> ${b.o}</div>`;

  const noteHTML = b.note
    ? `<div class="block-note" id="note-${i}" style="border-top-color: ${s.border}">${b.note}</div>`
    : '';

  return `<div class="block" style="background:${s.bg};border:1.5px solid ${s.border};animation-delay:${i * 0.04}s" onclick="toggleNote(${i})">
    <div class="block-header">
      <span class="block-icon">${b.icon}</span>
      <div class="block-content">
        <div class="block-meta">
          <span class="block-time" style="color:${s.accent}">${b.time}</span>
          <span class="block-type" style="background:${s.accent}">${s.label}</span>
        </div>
        ${activityHTML}
      </div>
      <span class="block-chevron" id="chev-${i}">▾</span>
    </div>
    ${noteHTML}
  </div>`;
}

function toggleNote(i) {
  const note = document.getElementById('note-' + i);
  const chev = document.getElementById('chev-' + i);
  if (!note) return;
  note.classList.toggle('open');
  chev.classList.toggle('open');
}

function renderContent() {
  const container = document.getElementById('content');

  if (activeTab === 'protocols') {
    let html = '';

    html += `<h2 class="section-title">Ground Rules</h2>`;
    html += GROUND_RULES.map((r, i) =>
      `<div class="rule-card" style="animation-delay:${i * 0.04}s">
        <div class="rule-title"><span>${r.i}</span><span>${r.t}</span></div>
        <div class="rule-desc">${r.d}</div>
      </div>`
    ).join('');

    html += `<h2 class="section-title" style="margin-top:24px">If-Then Protocols</h2>`;
    html += PROTOCOLS.map((p, i) =>
      `<div class="protocol-card" style="animation-delay:${i * 0.04}s">
        <div class="rule-title"><span>${p.i}</span><span>If: ${p.t}</span></div>
        <div class="protocol-steps">
          ${p.s.map((step, j) => `<div class="protocol-step"><span class="num">${j+1}.</span><span class="text">${step}</span></div>`).join('')}
        </div>
      </div>`
    ).join('');

    html += `<div class="big-picture">
      <h3>📋 How to Pick Your Day</h3>
      ${DECISION_TREE.map(d => `<div class="tree-item"><strong>${d.label}</strong> → ${d.value}</div>`).join('')}
    </div>`;

    container.innerHTML = html;
    return;
  }

  const schedule = SCHEDULES[activeTab];
  const info = PLAN_INFO[activeTab];

  let html = `<div class="plan-info" style="background:rgba(var(${info.accent === '--indigo' ? '99,102,241' : info.accent === '--pink' ? '236,72,153' : '139,92,246'}),0.06);border:1.5px solid rgba(var(${info.accent === '--indigo' ? '99,102,241' : info.accent === '--pink' ? '236,72,153' : '139,92,246'}),0.15)">
    <div class="plan-meta">
      <span class="plan-label">${info.label}</span>
      <span>Wake: ${info.wake}</span>
      <span>Sleep: ${info.sleep}</span>
      <span>${info.hours}</span>
    </div>
    ${info.desc}
  </div>`;

  html += `<div class="schedule">`;
  html += schedule.map((b, i) => renderBlock(b, i)).join('');
  html += `</div>`;

  container.innerHTML = html;
}

renderTabs();
renderContent();
</script>
</body>
</html>
